# Code-health gate. The platform matrix gives every target its own check and log,
# lint/detekt run alongside, and everything joins in `ci-gate`, the single
# code-health check branch protection requires. Gradle task names are used without
# module paths, so new modules are covered automatically.
#
# The process gate (require-linked-issue) lives in its own workflow file because
# its trigger differs (`edited`) and `needs:` cannot cross workflow files.
name: PR Check

on:
  pull_request:

# Cancel superseded runs on the same PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  platforms:
    name: Platform (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # fail-fast off: each leg is an independent verdict on its own platform, not
      # a stage of one build, so one red must not cancel the rest; all platform
      # feedback arrives in a single round.
      fail-fast: false
      matrix:
        include:
          - platform: android
            task: assembleDebug
          # compileKotlinJvm covers KMP modules' jvm target; compileKotlin covers
          # plain kotlin-jvm modules (the server). If the last plain kotlin-jvm
          # module ever goes away, Gradle fails this leg with "task not found";
          # drop compileKotlin from the list then.
          - platform: jvm
            task: compileKotlinJvm compileKotlin
          # Web legs build the distribution (not just compile) so bundling is
          # gated too; bundling failures do not surface at the compile level.
          - platform: web-js
            task: jsBrowserDistribution
          - platform: web-wasm
            task: wasmJsBrowserDistribution
          # TODO(#6): move this leg to macos-latest and add linkDebugFramework*
          #  (and iOS tests) once the iosApp is wired into Gradle/CI. Until then
          #  it gates iOS source sets at klib level, which a linux host can do.
          - platform: ios
            task: compileKotlinIosArm64 compileKotlinIosSimulatorArm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up build environment
        uses: ./.github/actions/setup-kmp
      - name: Build (${{ matrix.platform }})
        run: ./gradlew ${{ matrix.task }} --stacktrace

  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up build environment
        uses: ./.github/actions/setup-kmp
      - name: Android Lint
        run: ./gradlew lint --stacktrace

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up build environment
        uses: ./.github/actions/setup-kmp
      - name: Detekt (all source sets)
        run: ./gradlew detektAll --stacktrace

  # Join node, not a concern of its own: the needs list IS its function. It waits
  # for every code-health job and reduces their results to one stable required-check
  # name, so adding a job only ever touches this list, never branch protection.
  ci-gate:
    name: ci-gate
    needs: [platforms, lint, detekt]
    # A required check skipped via `if:` counts as satisfied, so any condition
    # that can skip this job on a failed or cancelled dependency would leave the
    # PR mergeable without CI. always() keeps the gate running; the step below
    # turns bad dependency results into a failure.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # needs.*.result (not an explicit list) so a job added to needs above is
      # covered automatically; an explicit list forgotten here would let a red
      # job pass the gate silently.
      - name: Fail unless every job succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1
