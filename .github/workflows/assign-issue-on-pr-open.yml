# Records ownership at the moment work becomes visible: when the PR opens.
# The PR author is added as assignee to every linked issue parsed from the
# description, so "who is working on this" is answered without a maintainer
# round-trip.
#
# Uses pull_request_target so the workflow can mutate issues on fork PRs too
# (pull_request from a fork is downgraded to a read-only token). Safe because
# the workflow never checks out the PR head and never executes head code.
name: Assign issue on PR open

on:
  pull_request_target:
    types: [opened, reopened, edited]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const raw = context.payload.pull_request.body || ''
            // Strip fenced code, inline-backtick spans, and HTML comments
            // before matching. Closing keywords inside these forms are not
            // honored by GitHub's own auto-close parser, so we mirror that.
            // Fences are stripped first so a stray backtick inside a fence
            // does not confuse the inline pass.
            const body = raw
              .replace(/```[\s\S]*?```/g, '')
              .replace(/`[^`\n]*`/g, '')
              .replace(/<!--[\s\S]*?-->/g, '')
            // The \b anchor keeps "fix" inside words like "prefix" from
            // matching; the regex catches the same closing keywords GitHub
            // recognizes for auto-close.
            const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi
            const issues = [...new Set([...body.matchAll(re)].map(m => parseInt(m[1], 10)))]
            const assignee = context.payload.pull_request.user.login
            for (const num of issues) {
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  assignees: [assignee],
                })
                core.info(`#${num}: assigned ${assignee}`)
              } catch (e) {
                core.warning(`#${num}: ${e.message}`)
              }
            }
